<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <!-- Noise/grain filter -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Subtle hex grid pattern -->
    <pattern id="hexPattern" x="0" y="0" width="120" height="104" patternUnits="userSpaceOnUse">
      <polygon points="60,2 113,31 113,73 60,102 7,73 7,31"
        fill="none" stroke="#3a6b3a" stroke-width="0.8" opacity="0.35"/>
    </pattern>

    <!-- Radial spotlight gradient (right side) -->
    <radialGradient id="spotlightRight" cx="78%" cy="45%" r="55%" fx="78%" fy="45%">
      <stop offset="0%"   stop-color="#1e4a20" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#0d200e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#060f06" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle top center light -->
    <radialGradient id="spotlightTop" cx="50%" cy="0%" r="50%" fx="50%" fy="0%">
      <stop offset="0%"   stop-color="#234d25" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#060f06" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette gradient -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="35%" stop-color="#060f06" stop-opacity="0"/>
      <stop offset="100%" stop-color="#010501" stop-opacity="0.85"/>
    </radialGradient>

    <!-- Lime accent gradient streaks -->
    <linearGradient id="limeLine1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7dce2a" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#7dce2a" stop-opacity="0.12"/>
      <stop offset="50%"  stop-color="#a8f040" stop-opacity="0.18"/>
      <stop offset="70%"  stop-color="#7dce2a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7dce2a" stop-opacity="0"/>
    </linearGradient>

    <!-- Deep dark green base gradient -->
    <linearGradient id="bgBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#071209"/>
      <stop offset="40%"  stop-color="#0d1f0e"/>
      <stop offset="70%"  stop-color="#0a1a0b"/>
      <stop offset="100%" stop-color="#040a04"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1920" height="1080" fill="url(#bgBase)"/>

  <!-- Hex grid overlay -->
  <rect width="1920" height="1080" fill="url(#hexPattern)" opacity="0.6"/>

  <!-- Right side spotlight -->
  <rect width="1920" height="1080" fill="url(#spotlightRight)"/>

  <!-- Top center light -->
  <rect width="1920" height="1080" fill="url(#spotlightTop)"/>

  <!-- Lime accent diagonal streaks -->
  <rect x="0" y="320" width="1920" height="80"
    fill="url(#limeLine1)" opacity="0.4"
    transform="rotate(-8 960 540)"/>
  <rect x="0" y="560" width="1920" height="50"
    fill="url(#limeLine1)" opacity="0.25"
    transform="rotate(-6 960 540)"/>

  <!-- Noise/grain texture layer -->
  <rect width="1920" height="1080" fill="#1a3a1c" opacity="0.08" filter="url(#grain)"/>

  <!-- Corner darkening (deep shadows) -->
  <rect width="500" height="400" fill="url(#vignette)" opacity="0.6"/>
  <rect x="1420" width="500" height="400" fill="url(#vignette)" opacity="0.5"/>
  <rect y="680" width="500" height="400" fill="url(#vignette)" opacity="0.6"/>
  <rect x="1420" y="680" width="500" height="400" fill="url(#vignette)" opacity="0.5"/>

  <!-- Vignette full -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Very subtle lime horizontal glow band (mid-frame) -->
  <rect x="0" y="400" width="1920" height="280"
    fill="#7dce2a" opacity="0.02"/>
</svg>
